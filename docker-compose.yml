services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '${API_PORT:-3000}:3000'

  ingest:
    build:
      context: .
      dockerfile: apps/ingest/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - '${INGEST_HEALTH_PORT:-3002}:3002'
      - '${TELTONIKA_TCP_PORT:-5027}:5027/tcp'
      - '${TELTONIKA_UDP_PORT:-5027}:5027/udp'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-5173}:5173'

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./infra/caddy/data:/data
      - ./infra/caddy/config:/config

volumes:
  postgres-data:
